name: Kinetica Docs Monitor

on:
  schedule:
    # 3x daily (UTC): 06:00, 12:00, 18:00
    - cron: "0 6,12,18 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write   # to commit snapshots/changes
  issues: write     # to open/update the review issue

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run monitor
        run: python monitor.py

      - name: Commit snapshots & changes
        run: |
          git config user.name  "docs-monitor[bot]"
          git config user.email "docs-monitor@users.noreply.github.com"
          git add snapshots changes
          if git diff --cached --quiet; then
            echo "No file changes to commit."
          else
            git commit -m "docs-monitor: update snapshots ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi

      - name: Open issue if docs changed
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'changes/_run_summary.json';
            if (!fs.existsSync(path)) return;
            const summary = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (!summary.changed || summary.changed.length === 0) {
              core.summary.addRaw(
                `${summary.checked} pages checked, 0 changed.`
              ).write();
              return;
            }

            // Build issue body with a coverage checklist + inline diffs.
            let body = `## Docs changed this run (${summary.run})\n\n`;
            body += `Check the box once test coverage has been reviewed/updated.\n\n`;
            for (const c of summary.changed) {
              body += `- [ ] ${c.url}\n`;
            }
            body += `\n---\n`;
            for (const c of summary.changed) {
              const diff = fs.readFileSync(c.change_file, 'utf8');
              body += `\n<details><summary>${c.url}</summary>\n\n${diff}\n</details>\n`;
            }

            const title = `📝 Docs changed: ${summary.changed.length} page(s) — ${summary.run.slice(0,10)}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['docs-change', 'qa-review'],
            });

            core.summary.addRaw(
              `${summary.checked} checked, ${summary.changed.length} changed — issue opened.`
            ).write();
